  /* ===== WELCOME BLOCK ===== */
.wel-wrap {
  text-align: center;
  margin-bottom: 28px;
  padding: 22px 10px 18px;
  border-radius: 20px;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(255,255,255,0.06);
  overflow: hidden;
  position: relative;
  min-height: 110px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Arabic slide */
.wel-ar-block {
  position: absolute;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.wel-ar {
  font-family: 'Cairo', sans-serif;
  font-weight: 900;
  font-size: 1.9rem;
  color: #fff;
}
.wel-ar span {
  animation: nameGlow 4s ease-in-out infinite;
}
.wel-divider {
  width: 55%;
  height: 2px;
  border-radius: 99px;
  animation: dividerColor 4s linear infinite;
}

/* English Tokyo block */
.wel-eng-block {
  position: absolute;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  opacity: 0;
}

.tokyo-word {
  display: flex;
  justify-content: center;
  gap: 2px;
  position: relative;
}

.tok-char {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  gap: 0px;
}

.tok-top {
  font-family: 'Anton', sans-serif;
  font-size: 0.55rem;
  line-height: 1;
  letter-spacing: 1px;
  opacity: 0;
  transform: translateY(-8px);
  transition: all 0.4s ease;
}
.tok-mid {
  font-family: 'Anton', sans-serif;
  font-size: 1.6rem;
  line-height: 1;
  opacity: 0;
  transform: scaleY(0.3);
  transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.tok-bot {
  font-family: 'Amiri', serif;
  font-size: 0.5rem;
  line-height: 1;
  letter-spacing: 2px;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.4s ease;
}

.tok-char.show .tok-top { opacity: 10; transform: translateY(0); }
.tok-char.show .tok-mid { opacity: 10; transform: scaleY(1); }
.tok-char.show .tok-bot { opacity: 10; transform: translateY(0); }

.tok-char.hide .tok-top { opacity: 10; transform: translateY(-8px); }
.tok-char.hide .tok-mid { opacity: 10; transform: scaleY(0.3); }
.tok-char.hide .tok-bot { opacity: 10; transform: translateY(8px); }

/* slide animations */
@keyframes slideOutLeft {
  0%   { opacity:1; transform: translateX(0); }
  100% { opacity:0; transform: translateX(-110%); }
}
@keyframes slideInRight {
  0%   { opacity:0; transform: translateX(60px); }
  100% { opacity:1; transform: translateX(0); }
}
@keyframes slideOutRight {
  0%   { opacity:1; transform: translateX(0); }
  100% { opacity:0; transform: translateX(110%); }
}
@keyframes slideInLeft {
  0%   { opacity:0; transform: translateX(-60px); }
  100% { opacity:1; transform: translateX(0); }
}
@keyframes nameGlow {
  0%,100% { color:#a855f7; text-shadow:0 0 12px #a855f7,0 0 25px #a855f7; }
  33%      { color:#22d3ee; text-shadow:0 0 12px #22d3ee,0 0 25px #22d3ee; }
  66%      { color:#f472b6; text-shadow:0 0 12px #f472b6,0 0 25px #f472b6; }
}
@keyframes dividerColor {
  0%,100% { background:#a855f7; box-shadow:0 0 10px #a855f7; }
  33%      { background:#22d3ee; box-shadow:0 0 10px #22d3ee; }
  66%      { background:#f472b6; box-shadow:0 0 10px #f472b6; }
}

function showQ() {
    const q = curEx.questions[qIdx];
    document.getElementById('qPos').innerText = `السؤال ${qIdx + 1} من ${curEx.questions.length}`;
    document.getElementById('exTitle').innerText = curEx.title;
    document.getElementById('qText').innerText = q.q;
    
    const cont = document.getElementById('optContainer');
    cont.innerHTML = '';
    q.os.forEach((o, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        if(answers[qIdx] === i) div.classList.add('selected');
        div.innerText = o;
        div.onclick = () => {
            answers[qIdx] = i;
            showQ();
        };
        cont.appendChild(div);
    });
}

function nextQ() {
    if(answers[qIdx] === undefined) {
        alert("اختر إجابةً أولاً!");
        return;
    }
    if(qIdx < curEx.questions.length - 1) {
        qIdx++;
        showQ();
    } else {
        finishEx();
    }
}

function finishEx() {
    const missed = [];
    curEx.questions.forEach((q, i) => {
        if(answers[i] === undefined) missed.push(i + 1);
    });
    
    if(missed.length > 0) {
        document.getElementById('missedQNum').innerText = missed.join("، ");
        nav('v-missed-alert');
        return;
    }
    
    nav('v-wait');
    updateLive(`أنهى اختبار: ${curEx.title}`);
    
    const score = answers.reduce((acc, ans, i) => acc + (ans === curEx.questions[i].a ? 1 : 0), 0);
    const result = {
        score: score,
        total: curEx.questions.length,
        time: new Date().toLocaleString('ar-EG'),
        answers: answers
    };
    
    database.ref(`omar_data/users/${curU}/pending/${curEx.id}`).set(result);
    sendTelegramAlert(`المستخدم ${rawName} أنهى اختبار ${curEx.title} بنتيجة ${score}/${curEx.questions.length}`);
}

      b.className = 'tok-bot';
      b.textContent = data.bot[0] || '·';
      b.style.color = data.botColor;

      wrap.appendChild(t);
      wrap.appendChild(m);
      wrap.appendChild(b);
      wordEl.appendChild(wrap);
    });

    subEl.textContent = data.sub;
    subEl.style.opacity = '0';

    // slide in block
    engBlock.style.animation = 'slideInRight 0.5s cubic-bezier(0.2,0.8,0.2,1) forwards';

    // animate chars in
    const chars = wordEl.querySelectorAll('.tok-char');
    chars.forEach((c, i) => {
      setTimeout(() => c.classList.add('show'), 80 + i * 80);
    });
    setTimeout(() => { subEl.style.transition='opacity 0.6s'; subEl.style.opacity='0.35'; }, 400);

    // after 2.2s hide chars then slide out
    _welLoop = setTimeout(() => {
      subEl.style.opacity = '0';
      chars.forEach((c, i) => {
        setTimeout(() => { c.classList.remove('show'); c.classList.add('hide'); }, i * 60);
      });
      setTimeout(() => {
        engBlock.style.animation = 'slideOutLeft 0.5s ease forwards';
        setTimeout(cb, 500);
      }, chars.length * 60 + 200);
    }, 2200);
  }

  function runSequence() {
    showArabic(() => {
      let idx = 0;
      function nextWord() {
        if (idx >= TOKYO_WORDS.length) {
          // finished all words → show arabic again
          engBlock.style.opacity = '0';
          runSequence();
          return;
        }
        engBlock.style.opacity   = '1';
        engBlock.style.animation = 'none';
        void engBlock.offsetWidth;
        showTokyoWord(idx, () => { idx++; nextWord(); });
      }
      nextWord();
    });
  }

  runSequence();
}
  </script>
