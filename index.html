<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BY Him</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Anton&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
  <style>
    /* ===== ROOT & RESET ===== */
    :root {
      --bg: #02010a;
      --accent: #7f00ff;
      --accent-rgb: 127,0,255;
      --glass-bg: rgba(255,255,255,0.03);
      --glow-color: rgba(127,0,255,0.5);
      --text: #fff;
      --space1: #0a0015;
      --space2: #06001a;
      --space3: #020010;
      --space-dark: linear-gradient(135deg, #0a0a1a 0%, #1a0a3a 50%, #0f0a2a 100%);
    }
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Cairo',sans-serif; }
    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
    }
    body {
      background-color: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }
    body.lvl4-bg { background: linear-gradient(135deg,#000,#ff7f00,#ff0000) !important; }
    body.lvl1-bg { background: linear-gradient(135deg,#020a05,#064e3b,#065f46) !important; }
    body.lvl2-bg { background: linear-gradient(135deg,#050510,#1e1b4b,#2d2a5d) !important; }
    body.lvl3-bg { background: linear-gradient(135deg,#0a0000,#983fb2,#dd3366) !important; }

    /* ===== PARTICLES ===== */
    #particles-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

    /* ===== AURA ===== */
    .aura {
      position:fixed; width:100vw; height:100vh; z-index:-1;
      background:radial-gradient(circle at var(--x,50%) var(--y,50%), var(--glow-color) 0%, transparent 70%);
      opacity:0.4; pointer-events:none;
    }

    /* ===== GLASS PANEL ===== */
    .glass-panel {
      background:var(--glass-bg);
      backdrop-filter:blur(35px);
      -webkit-backdrop-filter:blur(35px);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:36px;
      padding:36px 32px;
      width:92%;
      max-width:580px;
      position:relative;
      z-index:10;
      box-shadow:0 20px 60px rgba(0,0,0,0.5);
      animation: panelPulse 4s ease-in-out infinite;
    }

    /* ===== WELCOME BLOCK ===== */
    .wel-wrap {
      text-align: center;
      margin-bottom: 28px;
      padding: 22px 10px 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      overflow: hidden;
      position: relative;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .wel-ar-block {
      position: absolute;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    
    .wel-ar {
      font-family: 'Cairo', sans-serif;
      font-weight: 900;
      font-size: 1.9rem;
      color: #fff;
    }
    
    .wel-ar span {
      animation: nameGlow 4s ease-in-out infinite;
    }
    
    .wel-divider {
      width: 55%;
      height: 2px;
      border-radius: 99px;
      animation: dividerColor 4s linear infinite;
    }

    /* ===== MAIN TITLE ===== */
    .main-title { 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      margin-bottom: 25px; 
      line-height: 1; 
      filter: drop-shadow(0 0 15px var(--glow-color)); 
    }
    
    .main-title .word-1 { 
      font-family: 'Anton', sans-serif; 
      font-size: 5.5rem; 
      font-weight: normal; 
      background: linear-gradient(to bottom, #fff, #bbb); 
      -webkit-background-clip: text; 
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }
    
    .main-title .word-2 { 
      font-family: 'Anton', sans-serif; 
      font-size: 1.5rem; 
      font-weight: normal; 
      color: var(--accent); 
      letter-spacing: 8px; 
      margin-right: -8px; 
      margin-top: 10px; 
    }

    /* ===== ANIMATIONS ===== */
    @keyframes nameGlow {
      0%,100% { color:#a855f7; text-shadow:0 0 12px #a855f7,0 0 25px #a855f7; }
      33%      { color:#22d3ee; text-shadow:0 0 12px #22d3ee,0 0 25px #22d3ee; }
      66%      { color:#f472b6; text-shadow:0 0 12px #f472b6,0 0 25px #f472b6; }
    }
    
    @keyframes dividerColor {
      0%,100% { background:#a855f7; box-shadow:0 0 10px #a855f7; }
      33%      { background:#22d3ee; box-shadow:0 0 10px #22d3ee; }
      66%      { background:#f472b6; box-shadow:0 0 10px #f472b6; }
    }

    @keyframes slideOutLeft {
      0%   { opacity:1; transform: translateX(0); }
      100% { opacity:0; transform: translateX(-110%); }
    }
    
    @keyframes slideInRight {
      0%   { opacity:0; transform: translateX(60px); }
      100% { opacity:1; transform: translateX(0); }
    }
    
    @keyframes slideOutRight {
      0%   { opacity:1; transform: translateX(0); }
      100% { opacity:0; transform: translateX(110%); }
    }
    
    @keyframes slideInLeft {
      0%   { opacity:0; transform: translateX(-60px); }
      100% { opacity:1; transform: translateX(0); }
    }

    @keyframes panelPulse {
      0%,100% { box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 0 0 rgba(127,0,255,0); }
      50%      { box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 40px 4px rgba(127,0,255,0.18); }
    }

    /* ===== EXPLORE ITEMS ===== */
    #exList {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      width: 100%;
    }

    .exam-item {
      width: 100%;
      max-width: 350px;
      min-height: 200px;
      background: linear-gradient(135deg, rgba(10,10,26,0.8), rgba(26,10,58,0.8));
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: 1px solid rgba(127,0,255,0.2);
      position: relative;
      overflow: hidden;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 40px -15px var(--item-glow);
      padding: 20px;
    }

    .exam-item::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: rotate(45deg);
      transition: 0.7s;
    }

    .exam-item:hover::before {
      left: 100%;
      top: 100%;
    }

    .exam-item:hover {
      transform: scale(1.02) translateY(-5px);
      background: linear-gradient(135deg, rgba(15,15,35,0.9), rgba(35,15,70,0.9));
      border: 1px solid var(--item-color);
      box-shadow: 0 20px 50px -10px var(--item-glow);
    }

    .exam-item i {
      font-size: 3.5rem;
      color: var(--item-color);
      margin-bottom: 15px;
      filter: drop-shadow(0 0 15px var(--item-color));
      transition: 0.4s;
    }

    .exam-item:hover i {
      transform: scale(1.1);
    }

    .exam-item span {
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--item-color);
      text-shadow: 0 0 10px var(--item-color);
      text-align: center;
    }

    .exam-item b {
      font-size: 0.85rem;
      color: #fff;
      opacity: 0.5;
      margin-top: 10px;
      letter-spacing: 1px;
    }

    /* ===== RESULTS SECTION ===== */
    .results-container {
      width: 100%;
      max-width: 650px;
      background: var(--space-dark);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      border: 1px solid rgba(127,0,255,0.15);
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      animation: slideInRight 0.6s ease-out;
    }

    .results-header {
      text-align: center;
      margin-bottom: 25px;
      padding-bottom: 20px;
      border-bottom: 1px solid rgba(127,0,255,0.15);
    }

    .results-header h2 {
      font-family: 'Anton', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 2px;
      background: linear-gradient(90deg, #a855f7, #22d3ee, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .results-header p {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.45);
      font-family: 'Amiri', serif;
    }

    .result-item {
      background: rgba(255,255,255,0.04);
      border-left: 3px solid var(--item-color, #a855f7);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 14px;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .result-item:hover {
      background: rgba(255,255,255,0.07);
      transform: translateX(-5px);
      box-shadow: 0 8px 20px rgba(127,0,255,0.15);
    }

    .result-title {
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
      margin-bottom: 6px;
    }

    .result-text {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.65);
      line-height: 1.5;
    }

    .result-meta {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
      margin-top: 8px;
      font-family: 'Amiri', serif;
    }

    /* ===== CHAT SECTION ===== */
    .chat-fab {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #5b00d4, #8b00ff);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 1001;
      box-shadow: 0 0 0 0 rgba(127,0,255,0.5);
      animation: fabPulse 3s ease-in-out infinite;
      transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
      overflow: visible;
    }

    .chat-fab:hover { 
      transform: scale(1.12); 
      box-shadow: 0 8px 30px rgba(127,0,255,0.7); 
    }

    .chat-fab.open { 
      transform: rotate(360deg) scale(1.05); 
    }

    @keyframes fabPulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(127,0,255,0.45), 0 4px 20px rgba(0,0,0,0.4); }
      50%      { box-shadow: 0 0 0 10px rgba(127,0,255,0), 0 4px 20px rgba(0,0,0,0.4); }
    }

    .fab-icon {
      font-size: 1.4rem;
      color: #fff;
      transition: all 0.3s;
    }

    .chat-fab.open .fab-icon { 
      transform: rotate(90deg); 
    }

    .chat-badge {
      position: absolute;
      top: -4px;
      right: -4px;
      background: #ef4444;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 900;
      min-width: 20px;
      height: 20px;
      border-radius: 10px;
      padding: 0 5px;
      display: none;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 10px #ef4444;
      border: 2px solid #02010a;
      font-family: "Anton", sans-serif;
      letter-spacing: 0.5px;
    }

    /* ===== CHAT BOX ===== */
    #chatBox {
      position: fixed;
      bottom: 100px;
      right: 28px;
      width: 360px;
      max-height: 540px;
      background: rgba(6, 4, 18, 0.96);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(127,0,255,0.25);
      border-radius: 28px;
      display: none;
      flex-direction: column;
      z-index: 1000;
      box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04) inset;
      overflow: hidden;
      transform-origin: bottom right;
    }

    #chatBox.chat-entering {
      animation: chatSlideIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    #chatBox.chat-leaving {
      animation: chatSlideOut 0.25s ease forwards;
    }

    @keyframes chatSlideIn {
      0%   { opacity:0; transform: scale(0.7) translateY(20px); }
      100% { opacity:1; transform: scale(1) translateY(0); }
    }

    @keyframes chatSlideOut {
      0%   { opacity:1; transform: scale(1) translateY(0); }
      100% { opacity:0; transform: scale(0.75) translateY(16px); }
    }

    /* Chat Header */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 18px 12px;
      background: linear-gradient(135deg, rgba(80,0,180,0.5), rgba(20,0,60,0.6));
      border-bottom: 1px solid rgba(127,0,255,0.2);
      flex-shrink: 0;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .chat-header-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7f00ff, #22d3ee);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #fff;
      box-shadow: 0 0 12px rgba(127,0,255,0.5);
    }

    .chat-header-title {
      font-family: "Anton", sans-serif;
      font-size: 1rem;
      letter-spacing: 1.5px;
      background: linear-gradient(90deg, #fff, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1.1;
    }

    .chat-header-sub {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.35);
      font-family: "Amiri", serif;
      display: block;
    }

    .chat-close-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.5);
      width: 32px;
      height: 32px;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    .chat-close-btn:hover { 
      background: rgba(239,68,68,0.2); 
      border-color: rgba(239,68,68,0.4); 
      color: #ef4444; 
    }

    /* Chat Tabs */
    .chat-tabs {
      display: flex;
      gap: 6px;
      padding: 10px 14px 6px;
      flex-shrink: 0;
      background: rgba(0,0,0,0.25);
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .chat-tab {
      flex: 1;
      padding: 8px 0;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.07);
      background: transparent;
      color: rgba(255,255,255,0.4);
      font-family: "Cairo", sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all 0.25s;
    }

    .chat-tab.active {
      background: rgba(127,0,255,0.25);
      border-color: rgba(127,0,255,0.5);
      color: #fff;
      box-shadow: 0 0 14px rgba(127,0,255,0.2);
    }

    .chat-tab:not(.active):hover { 
      background: rgba(255,255,255,0.05); 
      color: rgba(255,255,255,0.65); 
    }

    /* Chat Panel & Messages */
    .chat-panel {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .chat-panel.active { 
      display: flex; 
    }

    #msgsArea, #aiMsgsArea {
      flex: 1;
      padding: 14px 14px 8px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scrollbar-width: thin;
      scrollbar-color: rgba(127,0,255,0.3) transparent;
    }

    #msgsArea::-webkit-scrollbar, 
    #aiMsgsArea::-webkit-scrollbar { 
      width: 3px; 
    }

    #msgsArea::-webkit-scrollbar-thumb, 
    #aiMsgsArea::-webkit-scrollbar-thumb { 
      background: rgba(127,0,255,0.4); 
      border-radius: 99px; 
    }

    /* Message Bubbles */
    .m-line {
      max-width: 82%;
      position: relative;
      animation: msgPop 0.28s cubic-bezier(0.34,1.56,0.64,1) forwards;
    }

    @keyframes msgPop { 
      0% { opacity:0; transform:scale(0.85) translateY(6px); } 
      100% { opacity:1; transform:scale(1) translateY(0); } 
    }

    .m-line b {
      font-size: 0.68rem;
      display: block;
      margin-bottom: 3px;
      font-family: "Amiri", serif;
    }

    .m-text {
      font-size: 0.875rem;
      line-height: 1.5;
      word-break: break-word;
    }

    .m-time {
      font-size: 0.6rem;
      opacity: 0.38;
      display: block;
      margin-top: 4px;
    }

    .m-me {
      align-self: flex-start;
      background: linear-gradient(135deg, #6b00ea, #9b00ff);
      color: #fff;
      border-radius: 18px 18px 18px 4px;
      padding: 10px 14px;
      box-shadow: 0 4px 16px rgba(127,0,255,0.35);
    }

    .m-me .m-time { 
      text-align: left; 
      color: rgba(255,255,255,0.6); 
      opacity: 1; 
    }

    .m-other {
      align-self: flex-end;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e2e8f0;
      border-radius: 18px 18px 4px 18px;
      padding: 10px 14px;
    }

    .m-other b { 
      color: rgba(255,255,255,0.45); 
    }

    .m-admin-box {
      align-self: flex-end;
      background: rgba(16,10,40,0.8) !important;
      border: 1px solid rgba(127,0,255,0.4) !important;
      border-right: 3px solid #7f00ff !important;
      border-radius: 18px 18px 4px 18px;
      padding: 10px 14px;
      box-shadow: 0 0 20px rgba(127,0,255,0.15);
    }

    .m-admin-name {
      font-family: "Anton", sans-serif !important;
      font-size: 0.75rem !important;
      background: linear-gradient(90deg, #a78bfa, #22d3ee) !important;
      -webkit-background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 4px;
    }

    .m-ai {
      align-self: flex-end;
      background: rgba(10, 20, 40, 0.8);
      border: 1px solid rgba(34,211,238,0.2);
      border-radius: 18px 18px 4px 18px;
      padding: 10px 14px;
      color: #e2e8f0;
      max-width: 88%;
    }

    .m-ai b {
      font-family: "Anton", sans-serif !important;
      font-size: 0.7rem;
      background: linear-gradient(90deg, #22d3ee, #7f00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
      display: block;
      margin-bottom: 3px;
    }

    .m-user-ai {
      align-self: flex-start;
      background: linear-gradient(135deg, #6b00ea, #9b00ff);
      color: #fff;
      border-radius: 18px 18px 18px 4px;
      padding: 10px 14px;
      max-width: 82%;
      box-shadow: 0 4px 16px rgba(127,0,255,0.35);
    }

    /* Chat Input */
    .chat-input-area {
      padding: 10px 12px 12px;
      display: flex;
      gap: 8px;
      align-items: center;
      background: rgba(0,0,0,0.3);
      border-top: 1px solid rgba(255,255,255,0.05);
      flex-shrink: 0;
    }

    #chatInp, #aiInp {
      flex: 1;
      padding: 11px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      font-family: "Cairo", sans-serif;
      font-size: 0.85rem;
      text-align: right;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    #chatInp:focus, #aiInp:focus {
      border-color: rgba(127,0,255,0.6);
      box-shadow: 0 0 0 3px rgba(127,0,255,0.12);
      background: rgba(255,255,255,0.08);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #6b00ea, #9b00ff);
      border: none;
      color: #fff;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(127,0,255,0.4);
    }

    .send-btn:hover { 
      transform: scale(1.08); 
      box-shadow: 0 6px 16px rgba(127,0,255,0.6); 
    }

    .send-btn:active { 
      transform: scale(0.94); 
    }

    .send-btn:disabled { 
      opacity: 0.4; 
      cursor: not-allowed; 
      transform: none; 
    }

    /* ===== VIEWS ===== */
    .view { 
      display: none; 
      opacity: 0; 
      transform: scale(0.98); 
    }

    .view.active { 
      display: block; 
      opacity: 1; 
      transform: scale(1); 
    }

    /* ===== BUTTONS ===== */
    .btn {
      width: 100%;
      padding: 18px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: 900;
      background: linear-gradient(135deg, #6b00ea, #9b00ff);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
      font-size: 1rem;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(127,0,255,0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      color: #888;
      margin-top: 15px;
    }

    .btn-ghost:hover {
      background: rgba(255,255,255,0.05);
      color: #fff;
    }

    /* ===== INPUT ===== */
    input {
      width: 100%;
      padding: 18px;
      border-radius: 20px;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      color: #fff;
      margin-bottom: 20px;
      outline: none;
      text-align: right;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input::placeholder {
      color: rgba(255,255,255,0.3);
    }

    input:focus {
      border-color: rgba(127,0,255,0.6);
      background: rgba(0,0,0,0.6);
    }

    /* ===== ERROR MESSAGE ===== */
    .err-msg {
      color: #ff4466;
      font-size: 0.8rem;
      text-align: center;
      margin-top: -12px;
      margin-bottom: 12px;
      font-family: 'Amiri', serif;
      min-height: 1.1rem;
      transition: opacity 0.3s;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .glass-panel {
        width: 95%;
        padding: 25px 20px;
      }

      .main-title .word-1 {
        font-size: 3rem;
      }

      .main-title .word-2 {
        font-size: 1rem;
        letter-spacing: 4px;
      }

      .exam-item {
        max-width: 100%;
        min-height: 150px;
      }

      .results-container {
        width: 95%;
        max-width: 95%;
        padding: 20px;
      }

      #chatBox {
        width: 85vw;
        max-width: 360px;
        height: 60vh;
        max-height: 540px;
      }

      .chat-fab {
        bottom: 20px;
        right: 20px;
        width: 50px;
        height: 50px;
      }

      .fab-icon {
        font-size: 1.2rem;
      }
    }

    @media (max-width: 480px) {
      .glass-panel {
        width: 96%;
        padding: 20px 16px;
        border-radius: 28px;
      }

      .main-title .word-1 {
        font-size: 2.2rem;
      }

      .main-title .word-2 {
        font-size: 0.9rem;
        letter-spacing: 3px;
      }

      .exam-item {
        max-width: 100%;
        min-height: 140px;
        padding: 15px;
      }

      .exam-item i {
        font-size: 2.8rem;
      }

      .exam-item span {
        font-size: 1.1rem;
      }

      .results-container {
        width: 96%;
        padding: 16px;
        margin: 0 auto;
      }

      .results-header h2 {
        font-size: 1.3rem;
      }

      .result-item {
        padding: 12px;
        margin-bottom: 10px;
      }

      .result-title {
        font-size: 0.95rem;
      }

      .result-text {
        font-size: 0.85rem;
      }

      #chatBox {
        width: 90vw;
        height: 70vh;
        bottom: 15px;
        right: 15px;
      }

      .chat-fab {
        bottom: 15px;
        right: 15px;
        width: 45px;
        height: 45px;
      }

      .fab-icon {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="aura"></div>
  <canvas id="particles-canvas"></canvas>

  <!-- Main Container -->
  <div id="mainContainer" class="glass-panel">
    <!-- Welcome Section -->
    <div id="welcomeView" class="view active">
      <div class="wel-wrap">
        <div class="wel-ar-block">
          <div class="wel-ar">أهلا وسهلا <span>بك</span></div>
          <div class="wel-divider"></div>
        </div>
      </div>

      <div class="explore-header" style="text-align: center; margin: 30px 0;">
        <div style="font-family: 'Anton', sans-serif; font-size: 0.75rem; color: rgba(255,255,255,0.6); letter-spacing: 2px; margin-bottom: 15px;">
          اختر من الخيارات
        </div>
      </div>

      <div id="exList"></div>

      <input type="hidden" id="selectedExam" value="">
    </div>

    <!-- Questions View -->
    <div id="questionsView" class="view" style="overflow-y: auto; max-height: 600px;">
      <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
        <button class="btn" id="backBtn" style="flex: 0 0 auto; width: 50px; padding: 0; border-radius: 15px;">
          <i class="fas fa-arrow-right"></i>
        </button>
        <h2 id="examTitle" style="flex: 1; font-size: 1.3rem; font-weight: 700;"></h2>
      </div>
      <div id="questionsList" style="display: flex; flex-direction: column; gap: 12px;"></div>
    </div>

    <!-- Results View -->
    <div id="resultsView" class="view"></div>
  </div>

  <!-- Chat FAB & Box -->
  <div class="chat-fab" id="chatFab" onclick="toggleChat()">
    <i class="fas fa-comments fab-icon"></i>
    <div class="chat-badge" id="chatBadge">0</div>
  </div>

  <div id="chatBox" class="chat-panel">
    <div class="chat-header">
      <div class="chat-header-left">
        <div class="chat-header-avatar">
          <i class="fas fa-robot"></i>
        </div>
        <div>
          <div class="chat-header-title">الدعم</div>
          <span class="chat-header-sub">نحن هنا للمساعدة</span>
        </div>
      </div>
      <button class="chat-close-btn" onclick="toggleChat()">
        <i class="fas fa-times"></i>
      </button>
    </div>

    <div class="chat-tabs">
      <button class="chat-tab active" data-tab="messages">
        <i class="fas fa-comments"></i> الرسائل
      </button>
      <button class="chat-tab" data-tab="ai">
        <i class="fas fa-brain"></i> الذكاء
      </button>
    </div>

    <div class="chat-panel active" data-panel="messages">
      <div id="msgsArea"></div>
      <div class="chat-input-area">
        <button class="send-btn" onclick="sendMessage()">
          <i class="fas fa-paper-plane"></i>
        </button>
        <input id="chatInp" type="text" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') sendMessage()">
      </div>
    </div>

    <div class="chat-panel" data-panel="ai">
      <div id="aiMsgsArea"></div>
      <div class="chat-input-area">
        <button class="send-btn" onclick="sendAIMessage()">
          <i class="fas fa-paper-plane"></i>
        </button>
        <input id="aiInp" type="text" placeholder="اسأل الذكاء الاصطناعي..." onkeypress="if(event.key==='Enter') sendAIMessage()">
      </div>
    </div>
  </div>

  <script>
    // Global State
    const state = {
      currentView: 'welcome',
      selectedExam: null,
      questions: [],
      results: [],
      chatOpen: false
    };

    // Initialize on load
    window.addEventListener('DOMContentLoaded', function() {
      loadExams();
      setupChatTabs();
      setupParticles();
    });

    // Load Exams from Firebase
    function loadExams() {
      const exList = document.getElementById('exList');
      const exams = [
        { id: '1', name: 'اختبار 1', icon: 'fas fa-graduation-cap', color: '#a855f7' },
        { id: '2', name: 'اختبار 2', icon: 'fas fa-book', color: '#22d3ee' },
        { id: '3', name: 'اختبار 3', icon: 'fas fa-brain', color: '#f472b6' }
      ];

      exList.innerHTML = exams.map(exam => `
        <div class="exam-item" onclick="selectExam('${exam.id}', '${exam.name}')" style="--item-color: ${exam.color}; --item-glow: ${exam.color}20;">
          <i class="${exam.icon}"></i>
          <span>${exam.name}</span>
          <b>ابدأ الآن</b>
        </div>
      `).join('');
    }

    // Select Exam
    function selectExam(id, name) {
      state.selectedExam = id;
      document.getElementById('selectedExam').value = id;
      document.getElementById('examTitle').textContent = name;
      
      // Load questions
      state.questions = [
        { id: 1, text: 'ما هو السؤال الأول؟', options: ['أ', 'ب', 'ج', 'د'] },
        { id: 2, text: 'ما هو السؤال الثاني؟', options: ['أ', 'ب', 'ج', 'د'] }
      ];
      
      loadQuestions();
      showView('questions');
    }

    // Load Questions
    function loadQuestions() {
      const list = document.getElementById('questionsList');
      list.innerHTML = state.questions.map(q => `
        <div class="result-item" style="--item-color: #a855f7;">
          <div class="result-title">السؤال ${q.id}: ${q.text}</div>
          <div style="display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap;">
            ${q.options.map(opt => `
              <button style="padding: 8px 14px; border-radius: 8px; background: rgba(127,0,255,0.2); border: 1px solid rgba(127,0,255,0.4); color: #fff; cursor: pointer; font-size: 0.9rem; transition: all 0.2s;" onmouseover="this.style.background='rgba(127,0,255,0.4)'" onmouseout="this.style.background='rgba(127,0,255,0.2)'">
                ${opt}
              </button>
            `).join('')}
          </div>
        </div>
      `).join('');
    }

    // Back Button
    document.addEventListener('DOMContentLoaded', function() {
      const backBtn = document.getElementById('backBtn');
      if(backBtn) {
        backBtn.addEventListener('click', function() {
          showView('welcome');
        });
      }
    });

    // Show View
    function showView(viewName) {
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      document.getElementById(viewName + 'View').classList.add('active');
      state.currentView = viewName;
    }

    // Show Results
    function showResults(results) {
      const resultsView = document.getElementById('resultsView');
      resultsView.innerHTML = `
        <div class="results-container">
          <div class="results-header">
            <h2>النتائج</h2>
            <p>تم تقييم أدائك</p>
          </div>
          ${results.map((r, i) => `
            <div class="result-item" style="--item-color: ${['#a855f7', '#22d3ee', '#f472b6'][i % 3]};">
              <div class="result-title">${r.title}</div>
              <div class="result-text">${r.description}</div>
              <div class="result-meta">${r.score}%</div>
            </div>
          `).join('')}
        </div>
      `;
      showView('results');
    }

    // Chat Functions
    function toggleChat() {
      const chatBox = document.getElementById('chatBox');
      const fab = document.getElementById('chatFab');
      
      state.chatOpen = !state.chatOpen;
      
      if(state.chatOpen) {
        chatBox.style.display = 'flex';
        fab.classList.add('open');
        chatBox.classList.add('chat-entering');
      } else {
        chatBox.classList.add('chat-leaving');
        setTimeout(() => {
          chatBox.style.display = 'none';
          fab.classList.remove('open');
          chatBox.classList.remove('chat-leaving');
        }, 250);
      }
    }

    function setupChatTabs() {
      const tabs = document.querySelectorAll('.chat-tab');
      tabs.forEach(tab => {
        tab.addEventListener('click', function() {
          const panelName = this.dataset.tab;
          
          document.querySelectorAll('.chat-tab').forEach(t => t.classList.remove('active'));
          this.classList.add('active');
          
          document.querySelectorAll('[data-panel]').forEach(p => p.classList.remove('active'));
          document.querySelector(`[data-panel="${panelName}"]`).classList.add('active');
        });
      });
    }

    function sendMessage() {
      const inp = document.getElementById('chatInp');
      const text = inp.value.trim();
      if(!text) return;
      
      const msgsArea = document.getElementById('msgsArea');
      const msg = document.createElement('div');
      msg.className = 'm-line m-me';
      msg.innerHTML = `
        <div class="m-text">${text}</div>
        <span class="m-time">${new Date().toLocaleTimeString('ar-EG', {hour: '2-digit', minute: '2-digit'})}</span>
      `;
      msgsArea.appendChild(msg);
      msgsArea.scrollTop = msgsArea.scrollHeight;
      inp.value = '';
    }

    function sendAIMessage() {
      const inp = document.getElementById('aiInp');
      const text = inp.value.trim();
      if(!text) return;
      
      const aiArea = document.getElementById('aiMsgsArea');
      const msg = document.createElement('div');
      msg.className = 'm-line m-user-ai';
      msg.innerHTML = `
        <div class="m-text">${text}</div>
      `;
      aiArea.appendChild(msg);
      
      setTimeout(() => {
        const response = document.createElement('div');
        response.className = 'm-line m-ai';
        response.innerHTML = `
          <b>الذكاء الاصطناعي</b>
          <div class="m-text">شكراً على سؤالك! سيتم الرد عليك قريباً.</div>
        `;
        aiArea.appendChild(response);
        aiArea.scrollTop = aiArea.scrollHeight;
      }, 500);
      
      inp.value = '';
    }

    // Particles Animation
    function setupParticles() {
      const canvas = document.getElementById('particles-canvas');
      const ctx = canvas.getContext('2d');
      
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      
      const particles = [];
      const particleCount = 50;
      
      for(let i = 0; i < particleCount; i++) {
        particles.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          radius: Math.random() * 2 + 1,
          vx: (Math.random() - 0.5) * 0.5,
          vy: (Math.random() - 0.5) * 0.5,
          opacity: Math.random() * 0.5 + 0.3
        });
      }
      
      function animate() {
        ctx.fillStyle = 'rgba(2, 1, 10, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        particles.forEach(p => {
          p.x += p.vx;
          p.y += p.vy;
          
          if(p.x < 0) p.x = canvas.width;
          if(p.x > canvas.width) p.x = 0;
          if(p.y < 0) p.y = canvas.height;
          if(p.y > canvas.height) p.y = 0;
          
          ctx.fillStyle = `rgba(127, 0, 255, ${p.opacity})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        });
        
        requestAnimationFrame(animate);
      }
      
      animate();
      
      window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });
    }
  </script>
</body>
</html>
