   /* ===== WELCOME BLOCK ===== */
.wel-wrap {
   text-align: center;
   margin-bottom: 28px;
   padding: 22px 10px 18px;
   border-radius: 20px;
   background: rgba(255,255,255,0.02);
   border: 1px solid rgba(255,255,255,0.06);
   overflow: hidden;
   position: relative;
   min-height: 110px;
   display: flex;
   align-items: center;
   justify-content: center;
}

/* Arabic slide */
.wel-ar-block {
   position: absolute;
   width: 100%;
   display: flex;
   flex-direction: column;
   align-items: center;
   gap: 8px;
}
.wel-ar {
   font-family: 'Cairo', sans-serif;
   font-weight: 900;
   font-size: 1.9rem;
   color: #fff;
}
.wel-ar span {
   animation: nameGlow 4s ease-in-out infinite;
}
.wel-divider {
   width: 55%;
   height: 2px;
   border-radius: 99px;
   animation: dividerColor 4s linear infinite;
}

/* English Tokyo block */
.wel-eng-block {
   position: absolute;
   width: 100%;
   display: flex;
   flex-direction: column;
   align-items: center;
   justify-content: center;
   gap: 4px;
   opacity: 0;
}

.tokyo-word {
   display: flex;
   justify-content: center;
   gap: 2px;
   position: relative;
}

.tok-char {
   display: inline-flex;
   flex-direction: column;
   align-items: center;
   gap: 0px;
}

.tok-top {
   font-family: 'Anton', sans-serif;
   font-size: 0.55rem;
   line-height: 1;
   letter-spacing: 1px;
   opacity: 0;
   transform: translateY(-8px);
   transition: all 0.4s ease;
}
.tok-mid {
   font-family: 'Anton', sans-serif;
   font-size: 1.6rem;
   line-height: 1;
   opacity: 0;
   transform: scaleY(0.3);
   transition: all 0.5s cubic-bezier(0.34,1.56,0.64,1);
}
.tok-bot {
   font-family: 'Amiri', serif;
   font-size: 0.5rem;
   line-height: 1;
   letter-spacing: 2px;
   opacity: 0;
   transform: translateY(8px);
   transition: all 0.4s ease;
}

.tok-char.show .tok-top { opacity: 10; transform: translateY(0); }
.tok-char.show .tok-mid { opacity: 10; transform: scaleY(1); }
.tok-char.show .tok-bot { opacity: 10; transform: translateY(0); }

.tok-char.hide .tok-top { opacity: 10; transform: translateY(-8px); }
.tok-char.hide .tok-mid { opacity: 10; transform: scaleY(0.3); }
.tok-char.hide .tok-bot { opacity: 10; transform: translateY(8px); }

/* slide animations */
@keyframes slideOutLeft {
   0%   { opacity:1; transform: translateX(0); }
   100% { opacity:0; transform: translateX(-110%); }
}
@keyframes slideInRight {
   0%   { opacity:0; transform: translateX(60px); }
   100% { opacity:1; transform: translateX(0); }
}
@keyframes slideOutRight {
   0%   { opacity:1; transform: translateX(0); }
   100% { opacity:0; transform: translateX(110%); }
}
@keyframes slideInLeft {
   0%   { opacity:0; transform: translateX(-60px); }
   100% { opacity:1; transform: translateX(0); }
}
@keyframes nameGlow {
   0%,100% { color:#a855f7; text-shadow:0 0 12px #a855f7,0 0 25px #a855f7; }
   33%      { color:#22d3ee; text-shadow:0 0 12px #22d3ee,0 0 25px #22d3ee; }
   66%      { color:#f472b6; text-shadow:0 0 12px #f472b6,0 0 25px #f472b6; }
}
@keyframes dividerColor {
   0%,100% { background:#a855f7; box-shadow:0 0 10px #a855f7; }
   33%      { background:#22d3ee; box-shadow:0 0 10px #22d3ee; }
   66%      { background:#f472b6; box-shadow:0 0 10px #f472b6; }
}
  #exList {

.exam-item {
 
    width: 100%; 
    max-width: 350px; 
    min-height: 200px; 
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(20px); 
    -webkit-backdrop-filter: blur(20px);

    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border: 1px solid rgba(255, 255, 255, 0.1);
    position: relative;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 10px 40px -15px var(--item-glow); 
    padding: 20px;
}


@media (max-width: 480px) {
    .exam-item {
        max-width: 100%; 
    }
}

.exam-item::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(
        45deg, 
        transparent, 
        rgba(255, 255, 255, 0.1), 
        transparent
    );
    transform: rotate(45deg);
    transition: 0.7s;
}

.exam-item:hover::before {
    left: 100%;
    top: 100%;
}

.exam-item:hover {
    transform: scale(1.02) translateY(-5px);
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--item-color);
    box-shadow: 0 20px 50px -10px var(--item-glow);
}

.exam-item i {
    font-size: 3.5rem;
    color: var(--item-color);
    margin-bottom: 15px;
    filter: drop-shadow(0 0 15px var(--item-color));
    transition: 0.4s;
}

.exam-item:hover i {
    transform: rotate(-5deg) scale(1.1);
}

.exam-item span {
    font-size: 1.4rem;
    font-weight: 900;
    color: var(--item-color);
    text-shadow: 0 0 10px var(--item-color);
    text-align: center;
}

.exam-item b {
    font-size: 0.85rem;
    color: #fff;
    opacity: 0.5;

  .omar {
    width:100%;
    height:60px;
    cursor: pointer;
    color: #fff;
    border-radius: 1rem;
    font-size: 13px;
    border: none;
    position: relative;

  }
  .omar::after {
    content:'';
    width:100%;

    background-image: radial-gradient(circle farthest-corner at 10% 20%, rgba(0,25,255,1) 17.8%, rgba(255,0,255,1) 100.8%);

    z-index: -1;
    position: absolute;
    left:0;
    top:0;
  }
  .omar:active {
    transform: scale(0.8) rotate(2deg);
    background: radial-gradient( circle farthest-corner at 10% 20%, rgba(2,245,255,1)17.8% , rgba(2,245,255,1) 100.2%);
    transition: 0.5s;
  }
  @keyframes moveBackground  {
      0%{
          background-position:0% 50%;
  }
  50%{
      background-position:100% 50%;
  }
  100%{
      background-position:0% 100%;
  }
  }
    

.view { display: none; }

.chat-fab {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 58px;
    height: 58px;
    border-radius: 50%;
    background: linear-gradient(135deg, #5b00d4, #8b00ff);
    display: none;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 1001;
    box-shadow: 0 0 0 0 rgba(127,0,255,0.5);
    animation: fabPulse 3s ease-in-out infinite;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s;
    overflow: visible;
}
.chat-fab:hover { transform: scale(1.12); box-shadow: 0 8px 30px rgba(127,0,255,0.7); }
.chat-fab.open { transform: rotate(360deg) scale(1.05); }
@keyframes fabPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(127,0,255,0.45), 0 4px 20px rgba(0,0,0,0.4); }
    50%      { box-shadow: 0 0 0 10px rgba(127,0,255,0), 0 4px 20px rgba(0,0,0,0.4); }
}
.fab-icon {
    font-size: 1.4rem;
    color: #fff;
    transition: all 0.3s;
}
.chat-fab.open .fab-icon { transform: rotate(90deg); }

.chat-badge {

}

/* --- Chat Window --- */
#chatBox {
    position: fixed;
    bottom: 100px;
    right: 28px;
    width: 360px;
    height: 540px;
    background: rgba(6, 4, 18, 0.96);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(127,0,255,0.25);
    border-radius: 28px;
    display: none;
    flex-direction: column;
    z-index: 1000;
    box-shadow: 0 25px 60px rgba(0,0,0,0.8), 0 0 0 1px rgba(255,255,255,0.04) inset;
    overflow: hidden;
    transform-origin: bottom right;
}

/* Chat Responsiveness */
@media (max-width: 480px) {
    #chatBox {
        width: 90vw;
        height: 72vh;
        right: 5vw;
        bottom: 90px;
    }
    .chat-fab {
        right: 20px;
        bottom: 20px;
    }
}

#chatBox.chat-entering {
    animation: chatSlideIn 0.35s cubic-bezier(0.34,1.56,0.64,1) forwards;
}
#chatBox.chat-leaving {
    animation: chatSlideOut 0.25s ease forwards;
}
@keyframes chatSlideIn {
    0%   { opacity:0; transform: scale(0.7) translateY(20px); }
    100% { opacity:1; transform: scale(1) translateY(0); }
}
@keyframes chatSlideOut {
    0%   { opacity:1; transform: scale(1) translateY(0); }
    100% { opacity:0; transform: scale(0.75) translateY(16px); }

/* NEW STUDENT CARD */
.stu-radar-card {
    position: relative;
    border-radius: 22px;
    padding: 16px 16px 16px 16px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 14px;
    border: 1px solid transparent;
    background: rgba(255,255,255,0.025);
    backdrop-filter: blur(20px);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.25s;
    overflow: hidden;
}
.stu-radar-card::before {
    content:'';
    position:absolute;
    inset:0;
    border-radius:22px;
    padding:1px;
    background: linear-gradient(135deg, var(--sc, #7f00ff), transparent 60%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
}
.stu-radar-card::after {
    content:'';
    position:absolute;
    top:-40%;left:-20%;
    width:60%;height:180%;
    background: radial-gradient(ellipse, var(--sc-glow, rgba(127,0,255,0.08)) 0%, transparent 70%);
    pointer-events:none;
}
.stu-radar-card:hover {
    box-shadow: 0 8px 28px var(--sc-shadow, rgba(127,0,255,0.2));
}
