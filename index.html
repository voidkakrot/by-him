<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الاختبارات الذكية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #7f00ff;
            --secondary: #00d4ff;
            --danger: #ff0055;
            --success: #00ff88;
            --warning: #ffb700;
            --dark: #0a0015;
            --light: #f0f0f0;
            --text: #ffffff;
            --text-dim: #b0b0b0;
        }

        body {
            font-family: 'Cairo', 'Tajawal', sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #1a0033 50%, #0f0020 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Animation */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(127, 0, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 212, 255, 0.1) 0%, transparent 50%);
            z-index: 0;
            animation: gradientShift 15s ease infinite;
            pointer-events: none;
        }

        @keyframes gradientShift {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        /* Glass Panel */
        .glass-panel {
            background: rgba(15, 0, 32, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(127, 0, 255, 0.3);
            border-radius: 30px;
            padding: 40px 35px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: panelGlow 4s ease-in-out infinite;
        }

        @keyframes panelGlow {
            0%, 100% { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 30px rgba(127, 0, 255, 0.1); }
            50% { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 50px rgba(127, 0, 255, 0.25); }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 30px;
            animation: slideDown 0.6s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            letter-spacing: -1px;
        }

        .header p {
            color: var(--text-dim);
            font-size: 0.95rem;
            font-weight: 300;
        }

        /* Tab Navigation */
        .tab-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 16px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            position: relative;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--text);
            box-shadow: 0 10px 25px rgba(127, 0, 255, 0.3);
        }

        .tab-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        /* Form Content */
        .form-content {
            display: none;
        }

        .form-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Input Fields */
        .form-group {
            margin-bottom: 18px;
            animation: slideUp 0.5s ease backwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group:nth-child(1) { animation-delay: 0.1s; }
        .form-group:nth-child(2) { animation-delay: 0.2s; }
        .form-group:nth-child(3) { animation-delay: 0.3s; }
        .form-group:nth-child(4) { animation-delay: 0.4s; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid rgba(127, 0, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            color: var(--text);
            font-size: 1rem;
            font-family: 'Cairo', sans-serif;
            outline: none;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: rgba(127, 0, 255, 0.1);
            box-shadow: 0 0 20px rgba(127, 0, 255, 0.2);
            transform: translateY(-2px);
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        /* Error Messages */
        .error-msg {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 6px;
            min-height: 1.2rem;
            display: flex;
            align-items: center;
            gap: 5px;
            animation: shake 0.3s ease;
        }

        .error-msg i {
            font-size: 0.75rem;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* Success Messages */
        .success-msg {
            background: rgba(0, 255, 136, 0.1);
            border-left: 3px solid var(--success);
            color: var(--success);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: 'Cairo', sans-serif;
            position: relative;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:active::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #bb00ff);
            color: var(--text);
            box-shadow: 0 10px 30px rgba(127, 0, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(127, 0, 255, 0.4);
        }

        .btn-secondary {
            background: transparent;
            border: 1.5px solid rgba(127, 0, 255, 0.5);
            color: var(--primary);
        }

        .btn-secondary:hover {
            background: rgba(127, 0, 255, 0.1);
            border-color: var(--primary);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Password Strength Indicator */
        .password-strength {
            margin-top: 8px;
            height: 4px;
            border-radius: 2px;
            background: rgba(255, 255, 255, 0.1);
            overflow: hidden;
        }

        .password-strength-bar {
            height: 100%;
            width: 0%;
            background: var(--danger);
            transition: all 0.3s ease;
        }

        .password-strength-bar.weak { width: 33.33%; background: var(--danger); }
        .password-strength-bar.medium { width: 66.66%; background: var(--warning); }
        .password-strength-bar.strong { width: 100%; background: var(--success); }

        /* Info Box */
        .info-box {
            background: rgba(0, 212, 255, 0.1);
            border-left: 3px solid var(--secondary);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* Checkbox */
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin: 0;
            cursor: pointer;
            accent-color: var(--primary);
        }

        .checkbox-group label {
            margin: 0;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 400;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-dim);
        }

        .footer a {
            color: var(--primary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer a:hover {
            color: var(--secondary);
        }

        /* Anti-Cheating Features */
        .warning-banner {
            background: linear-gradient(135deg, rgba(255, 0, 85, 0.1), rgba(255, 183, 0, 0.1));
            border: 1px solid var(--danger);
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .warning-banner.show {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .warning-banner i {
            color: var(--danger);
            font-size: 1.2rem;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 8px;
        }

        .status-badge.verified {
            background: rgba(0, 255, 136, 0.1);
            color: var(--success);
            border: 1px solid rgba(0, 255, 136, 0.3);
        }

        .status-badge.warning {
            background: rgba(255, 183, 0, 0.1);
            color: var(--warning);
            border: 1px solid rgba(255, 183, 0, 0.3);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .glass-panel {
                padding: 30px 20px;
                border-radius: 25px;
            }

            .header h1 {
                font-size: 2rem;
            }

            .container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glass-panel">
            <!-- Header -->
            <div class="header">
                <h1><i class="fas fa-graduation-cap"></i> أكاديمية</h1>
                <p>منصة الاختبارات الذكية والآمنة</p>
            </div>

            <!-- Tab Navigation -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="login" onclick="switchTab('login')">
                    <i class="fas fa-sign-in-alt"></i> دخول
                </button>
                <button class="tab-btn" data-tab="register" onclick="switchTab('register')">
                    <i class="fas fa-user-plus"></i> تسجيل جديد
                </button>
            </div>

            <!-- LOGIN FORM -->
            <div id="login" class="form-content active">
                <div id="loginWarning" class="warning-banner">
                    <i class="fas fa-eye-slash"></i>
                    <span>يتم مراقبة جلستك للحفاظ على نزاهة الاختبار</span>
                </div>

                <form onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>رقم معرف الطالب أو البريد الإلكتروني</label>
                        <input type="text" id="loginUsername" placeholder="STD-2024-001 أو example@email.com" required>
                        <div class="error-msg" id="loginUsernameError"></div>
                    </div>

                    <div class="form-group">
                        <label>كلمة المرور</label>
                        <input type="password" id="loginPassword" placeholder="كلمة المرور الآمنة..." required>
                        <div class="error-msg" id="loginPasswordError"></div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">تذكرني على هذا الجهاز</label>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <span id="loginBtnText"><i class="fas fa-lock"></i> الدخول الآمن</span>
                        <span id="loginSpinner" style="display: none;"><i class="fas fa-spinner fa-spin"></i></span>
                    </button>
                </form>

                <div class="footer">
                    <p>هل نسيت كلمة المرور؟ <a href="#" onclick="alert('خاصية قيد التطوير - تواصل مع الإدارة')">استعد هنا</a></p>
                </div>
            </div>

            <!-- REGISTER FORM -->
            <div id="register" class="form-content">
                <div class="info-box">
                    <i class="fas fa-shield-halved"></i>
                    <span>استخدم بيانات حقيقية - النظام يحقق من الهوية تلقائياً</span>
                </div>

                <form onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>الاسم الكامل</label>
                        <input type="text" id="regFullName" placeholder="الاسم الأول والأخير..." required>
                        <div class="error-msg" id="regNameError"></div>
                    </div>

                    <div class="form-group">
                        <label>البريد الإلكتروني الجامعي</label>
                        <input type="email" id="regEmail" placeholder="student@university.edu" required>
                        <div class="error-msg" id="regEmailError"></div>
                    </div>

                    <div class="form-group">
                        <label>رقم معرف الطالب</label>
                        <input type="text" id="regStudentId" placeholder="STD-2024-001" required>
                        <div class="error-msg" id="regStudentIdError"></div>
                    </div>

                    <div class="form-group">
                        <label>كلمة المرور (قوية)</label>
                        <input type="password" id="regPassword" placeholder="8 أحرف على الأقل مع أرقام وحروف كبيرة" 
                               oninput="checkPasswordStrength(this.value)" required>
                        <div class="password-strength">
                            <div class="password-strength-bar" id="strengthBar"></div>
                        </div>
                        <small style="color: var(--text-dim); font-size: 0.75rem;">يجب أن تحتوي على: حروف كبيرة، أرقام، وأحرف خاصة</small>
                        <div class="error-msg" id="regPasswordError"></div>
                    </div>

                    <div class="form-group">
                        <label>تأكيد كلمة المرور</label>
                        <input type="password" id="regPasswordConfirm" placeholder="كرر كلمة المرور..." required>
                        <div class="error-msg" id="regConfirmError"></div>
                    </div>

                    <div class="form-group">
                        <label>المرحلة الدراسية</label>
                        <select id="regLevel" required>
                            <option value="">اختر المرحلة...</option>
                            <option value="lvl1">المرحلة الأولى - البدايات</option>
                            <option value="lvl2">المرحلة الثانية - الصعود</option>
                            <option value="lvl3">المرحلة الثالثة - الحكمة</option>
                        </select>
                        <div class="error-msg" id="regLevelError"></div>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="agreeTerms" required>
                        <label for="agreeTerms">أوافق على <a href="#" style="color: var(--primary);" onclick="alert('الشروط والأحكام')">الشروط والأحكام</a> والسياسات الأمنية</label>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <span id="regBtnText"><i class="fas fa-user-shield"></i> إنشاء حساب آمن</span>
                        <span id="regSpinner" style="display: none;"><i class="fas fa-spinner fa-spin"></i></span>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script id="app-logic">
        // ===== FIREBASE CONFIG =====
        const firebaseConfig = {
            apiKey: "AIzaSyDD7qteBijzuhKLqZuxUt0NAGNz9t3Mf5U",
            authDomain: "omqr-8a2ba.firebaseapp.com",
            databaseURL: "https://omqr-8a2ba-default-rtdb.firebaseio.com",
            projectId: "omqr-8a2ba",
            storageBucket: "omqr-8a2ba.firebasestorage.app",
            messagingSenderId: "59834457864",
            appId: "1:59834457864:web:57963a63081f33f09e96bd"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ===== ANTI-CHEATING DETECTION =====
        let userSession = {
            id: generateSessionId(),
            startTime: Date.now(),
            tabChanges: 0,
            copyAttempts: 0,
            pasteAttempts: 0,
            rightClickAttempts: 0,
            devToolsAttempts: 0,
            mouseLeaveCount: 0,
            maxTabChanges: 3,
            maxMouseLeave: 3,
            warnings: [],
            isBlocked: false
        };

        function generateSessionId() {
            return 'session_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
        }

        // Detect tab switching
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                userSession.tabChanges++;
                showWarning(`⚠️ تحذير: تم اكتشاف تبديل التاب (${userSession.tabChanges}/${userSession.maxTabChanges})`);
                logCheatAttempt('tab_switch', userSession.tabChanges);
                
                if (userSession.tabChanges >= userSession.maxTabChanges) {
                    blockSession('عدد محاولات مغادرة التاب كثير جداً!');
                }
            }
        });

        // Prevent copy/paste
        document.addEventListener('copy', (e) => {
            userSession.copyAttempts++;
            showWarning('❌ النسخ معطل في هذه الصفحة');
            logCheatAttempt('copy_attempt', userSession.copyAttempts);
            e.preventDefault();
        });

        document.addEventListener('paste', (e) => {
            userSession.pasteAttempts++;
            if (!e.target.matches('input[type="password"], input[type="text"], textarea')) {
                showWarning('❌ اللصق معطل في هذه الصفحة');
                logCheatAttempt('paste_attempt', userSession.pasteAttempts);
                e.preventDefault();
            }
        });

        // Prevent right-click
        document.addEventListener('contextmenu', (e) => {
            userSession.rightClickAttempts++;
            e.preventDefault();
            showWarning('❌ القوائم السياقية معطلة');
            logCheatAttempt('right_click', userSession.rightClickAttempts);
        });

        // Detect mouse leaving window
        document.addEventListener('mouseleave', () => {
            userSession.mouseLeaveCount++;
            if (userSession.mouseLeaveCount >= userSession.maxMouseLeave) {
                showWarning('⚠️ تحذير: مغادرة النافذة مرات عديدة!');
                logCheatAttempt('window_blur', userSession.mouseLeaveCount);
            }
        });

        // Detect keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            // Ctrl+C, Ctrl+V, Ctrl+X
            if ((e.ctrlKey || e.metaKey) && (e.key === 'c' || e.key === 'v' || e.key === 'x')) {
                e.preventDefault();
                showWarning('❌ اختصارات لوحة المفاتيح معطلة');
                logCheatAttempt('keyboard_shortcut', 1);
            }
            // F12, Ctrl+Shift+I, Ctrl+Shift+J
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C'))) {
                e.preventDefault();
                userSession.devToolsAttempts++;
                showWarning('🔒 أدوات المطور معطلة');
                logCheatAttempt('devtools_attempt', userSession.devToolsAttempts);
            }
        });

        function showWarning(message) {
            const banner = document.getElementById('loginWarning');
            if (banner) {
                const warningText = document.createElement('div');
                warningText.style.cssText = 'color: var(--text); font-size: 0.9rem; animation: slideIn 0.3s ease;';
                warningText.innerHTML = message;
                
                banner.innerHTML = '';
                banner.appendChild(warningText);
                banner.classList.add('show');
                
                setTimeout(() => {
                    if (banner.classList.contains('show')) {
                        banner.classList.remove('show');
                    }
                }, 3000);
            }
        }

        function blockSession(reason) {
            userSession.isBlocked = true;
            alert('❌ تم حظر الجلسة: ' + reason);
            document.querySelector('.glass-panel').innerHTML = `
                <div style="text-align: center; padding: 60px 30px;">
                    <i class="fas fa-ban" style="font-size: 4rem; color: var(--danger); margin-bottom: 20px; display: block;"></i>
                    <h2 style="color: var(--danger); margin-bottom: 15px;">جلسة محظورة</h2>
                    <p style="color: var(--text-dim); margin-bottom: 10px;">تم اكتشاف محاولات غش متعددة</p>
                    <p style="color: var(--text-dim); font-size: 0.9rem;">${reason}</p>
                    <p style="color: var(--warning); margin-top: 20px; font-size: 0.85rem;">⚠️ تم تسجيل هذه المحاولة وإرسالها للإدارة</p>
                </div>
            `;
            logCheatAttempt('session_blocked', 1, reason);
        }

        function logCheatAttempt(type, count, details = '') {
            database.ref('cheat_logs').push({
                sessionId: userSession.id,
                type: type,
                count: count,
                details: details,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                screenResolution: `${window.screen.width}x${window.screen.height}`
            }).catch(err => console.log('خطأ في التسجيل:', err));
        }

        // ===== TAB SWITCHING =====
        function switchTab(tabName) {
            document.querySelectorAll('.form-content').forEach(el => {
                el.classList.remove('active');
            });

            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            document.getElementById(tabName).classList.add('active');
            event.target.closest('.tab-btn').classList.add('active');
        }

        // ===== PASSWORD STRENGTH CHECK =====
        function checkPasswordStrength(password) {
            const strengthBar = document.getElementById('strengthBar');
            let strength = 'weak';
            let score = 0;

            if (password.length >= 8) score++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) score++;
            if (/[0-9]/.test(password)) score++;
            if (/[^a-zA-Z0-9]/.test(password)) score++;

            if (score >= 3) strength = 'medium';
            if (score >= 4) strength = 'strong';

            strengthBar.className = 'password-strength-bar ' + strength;
        }

        // ===== VALIDATION FUNCTIONS =====
        function validateStudentId(id) {
            const regex = /^STD-\d{4}-\d{3}$/;
            return regex.test(id);
        }

        function validateEmail(email) {
            const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return regex.test(email);
        }

        function validatePassword(password) {
            return password.length >= 8 && 
                   /[a-z]/.test(password) && 
                   /[A-Z]/.test(password) && 
                   /[0-9]/.test(password);
        }

        function clearErrors(prefix) {
            document.querySelectorAll(`.error-msg[id^="${prefix}"]`).forEach(el => {
                el.textContent = '';
            });
        }

        function showError(elementId, message) {
            const errorEl = document.getElementById(elementId);
            if (errorEl) {
                errorEl.innerHTML = `<i class="fas fa-exclamation-circle"></i> ${message}`;
            }
        }

        // ===== LOGIN HANDLER =====
        function handleLogin(e) {
            e.preventDefault();
            
            if (userSession.isBlocked) {
                alert('❌ جلستك محظورة - تواصل مع الإدارة');
                return;
            }

            clearErrors('login');

            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            // Validation
            if (!username || username.length < 3) {
                showError('loginUsernameError', 'أدخل رقم المعرف أو البريد الإلكتروني');
                return;
            }

            if (!password || password.length < 6) {
                showError('loginPasswordError', 'كلمة المرور يجب أن تكون 6 أحرف على الأقل');
                return;
            }

            // Show loading
            document.getElementById('loginBtnText').style.display = 'none';
            document.getElementById('loginSpinner').style.display = 'inline-block';

            // Simulate login
            setTimeout(() => {
                // Save session
                if (rememberMe) {
                    localStorage.setItem('user', JSON.stringify({
                        username,
                        sessionId: userSession.id,
                        timestamp: Date.now()
                    }));
                }

                // Success
                document.querySelector('.glass-panel').innerHTML = `
                    <div style="text-align: center; padding: 40px 20px;">
                        <i class="fas fa-check-circle" style="font-size: 3rem; color: var(--success); margin-bottom: 20px;"></i>
                        <h2 style="margin-bottom: 10px;">✅ مرحباً بعودتك!</h2>
                        <p style="color: var(--text-dim); margin-bottom: 20px;">تم تسجيل دخولك بنجاح</p>
                        <div style="background: rgba(0,212,255,0.1); border: 1px solid rgba(0,212,255,0.3); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                            <small style="color: var(--text-dim);">معرف الجلسة الآمنة:</small>
                            <code style="display: block; color: var(--secondary); margin-top: 8px; word-break: break-all; font-size: 0.8rem;">${userSession.id}</code>
                        </div>
                        <div style="background: rgba(0,255,136,0.1); border-left: 3px solid var(--success); padding: 12px; border-radius: 8px;">
                            <p style="color: var(--success); font-size: 0.9rem;"><i class="fas fa-shield"></i> جلسة محمية بأنظمة الأمان المتقدمة</p>
                        </div>
                    </div>
                `;

                // Log to Firebase
                database.ref('login_logs').push({
                    username,
                    sessionId: userSession.id,
                    timestamp: new Date().toISOString(),
                    loginTime: new Date(userSession.startTime).toLocaleTimeString('ar-EG'),
                    tabChanges: userSession.tabChanges,
                    copyAttempts: userSession.copyAttempts,
                    pasteAttempts: userSession.pasteAttempts,
                    rightClickAttempts: userSession.rightClickAttempts,
                    devToolsAttempts: userSession.devToolsAttempts,
                    userAgent: navigator.userAgent
                });
            }, 1500);
        }

        // ===== REGISTER HANDLER =====
        function handleRegister(e) {
            e.preventDefault();
            clearErrors('reg');

            const fullName = document.getElementById('regFullName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const studentId = document.getElementById('regStudentId').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;
            const level = document.getElementById('regLevel').value;

            // Validation
            if (!fullName || fullName.split(' ').length < 2) {
                showError('regNameError', 'يجب إدخال الاسم الأول والأخير');
                return;
            }

            if (!validateEmail(email)) {
                showError('regEmailError', 'البريد الإلكتروني غير صحيح (يجب أن ينتهي بـ .edu)');
                return;
            }

            if (!validateStudentId(studentId)) {
                showError('regStudentIdError', 'رقم المعرف يجب أن يكون بصيغة: STD-2024-001');
                return;
            }

            if (!validatePassword(password)) {
                showError('regPasswordError', 'كلمة المرور ضعيفة - يجب أن تحتوي على: حروف كبيرة وصغيرة، أرقام');
                return;
            }

            if (password !== passwordConfirm) {
                showError('regConfirmError', 'كلمات المرور غير متطابقة');
                return;
            }

            if (!level) {
                showError('regLevelError', 'يجب اختيار المرحلة الدراسية');
                return;
            }

            // Show loading
            document.getElementById('regBtnText').style.display = 'none';
            document.getElementById('regSpinner').style.display = 'inline-block';

            // Simulate registration
            setTimeout(() => {
                // Save to Firebase
                database.ref('users').push({
                    fullName,
                    email,
                    studentId,
                    level,
                    registrationDate: new Date().toISOString(),
                    sessionId: userSession.id,
                    verified: false,
                    securityLevel: 'high',
                    userAgent: navigator.userAgent
                }).then(() => {
                    // Success
                    document.querySelector('.glass-panel').innerHTML = `
                        <div style="text-align: center; padding: 40px 20px;">
                            <i class="fas fa-user-check" style="font-size: 3rem; color: var(--success); margin-bottom: 20px;"></i>
                            <h2 style="margin-bottom: 10px;">✅ تم إنشاء الحساب بنجاح!</h2>
                            <p style="color: var(--text-dim); margin-bottom: 20px;">مرحباً بك ${fullName}</p>
                            <div style="background: rgba(255,183,0,0.1); border: 1px solid rgba(255,183,0,0.3); padding: 15px; border-radius: 10px; margin-bottom: 20px;">
                                <p style="color: var(--warning); font-size: 0.9rem;"><i class="fas fa-envelope"></i> يرجى التحقق من بريدك الإلكتروني</p>
                                <small style="color: var(--text-dim);">${email}</small>
                            </div>
                            <div style="background: rgba(0,255,136,0.1); border-left: 3px solid var(--success); padding: 12px; border-radius: 8px; margin-bottom: 20px;">
                                <p style="color: var(--success); font-size: 0.9rem;"><i class="fas fa-shield-halved"></i> حسابك محمي بأنظمة الأمان المتقدمة</p>
                            </div>
                            <button class="btn btn-primary" onclick="location.reload()">
                                <i class="fas fa-redo"></i> العودة لتسجيل الدخول
                            </button>
                        </div>
                    `;

                    // Log registration
                    database.ref('registration_logs').push({
                        fullName,
                        email,
                        studentId,
                        level,
                        timestamp: new Date().toISOString(),
                        sessionId: userSession.id,
                        securityVerification: 'passed'
                    });
                }).catch(err => {
                    showError('regNameError', 'حدث خطأ أثناء التسجيل - حاول لاحقاً');
                    document.getElementById('regBtnText').style.display = 'inline';
                    document.getElementById('regSpinner').style.display = 'none';
                    console.error('خطأ:', err);
                });
            }, 1500);
        }

        // ===== PREVENT DEVELOPER TOOLS =====
        let devToolsOpen = false;
        const threshold = 160;

        setInterval(() => {
            if (window.outerHeight - window.innerHeight > threshold || 
                window.outerWidth - window.innerWidth > threshold) {
                if (!devToolsOpen) {
                    devToolsOpen = true;
                    userSession.devToolsAttempts++;
                    logCheatAttempt('devtools_open', userSession.devToolsAttempts);
                    console.warn('⚠️ لا تحاول فتح أدوات المطور في الاختبار!');
                }
            } else {
                devToolsOpen = false;
            }
        }, 500);

        // ===== INITIALIZATION =====
        document.addEventListener('DOMContentLoaded', () => {
            // Check if user is already logged in
            const savedUser = localStorage.getItem('user');
            if (savedUser) {
                const user = JSON.parse(savedUser);
                document.getElementById('loginUsername').value = user.username;
                document.getElementById('rememberMe').checked = true;
            }

            // Log session start
            database.ref('session_logs').push({
                sessionId: userSession.id,
                startTime: new Date(userSession.startTime).toISOString(),
                userAgent: navigator.userAgent,
                screenResolution: `${window.screen.width}x${window.screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            }).catch(err => console.log('خطأ في تسجيل الجلسة:', err));
        });
    </script>
</body>
</html>
